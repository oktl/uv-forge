site_name: UV Forge
site_url: https://oktl.github.io/uv-forge/
site_description: A desktop app for forging Python projects with UV — templates, frameworks, and smart scaffolding
site_author: Tim Lang
repo_url: https://github.com/oktl/uv-forge
repo_name: oktl/uv-forge

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - User Guide:
      - Templates: guide/templates.md
      - Git Integration: guide/git-integration.md
      - Settings: guide/settings.md
      - Presets: guide/presets.md
      - PyPI Name Checker: guide/pypi-checker.md
      - Post-Build Automation: guide/post-build.md
  - Reference:
      - Frameworks & Project Types: reference/frameworks-and-types.md
      - Keyboard Shortcuts: reference/keyboard-shortcuts.md
      - Architecture: reference/architecture.md
      - Troubleshooting: reference/troubleshooting.md
  - Contributing: contributing.md
  - Changelog: changelog.md
